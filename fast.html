<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="口袋桌宠">
<meta name="theme-color" content="#f7c948">
<title>口袋桌宠</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial,sans-serif;color:#22211f;background:#f6f1e8}*{box-sizing:border-box}body{min-height:100dvh;margin:0;overflow:hidden;background:linear-gradient(150deg,#f6f1e8 0%,#e9f2ef 58%,#f8dedb 100%);color:#22211f}button{font:inherit;color:inherit}.app{display:grid;grid-template-rows:auto auto 1fr auto;gap:14px;min-height:100dvh;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom))}.top{display:flex;align-items:center;justify-content:space-between}.top p{margin:0 0 4px;color:#716a5f;font-size:12px;font-weight:700;text-transform:uppercase}.top h1{margin:0;font-size:34px;line-height:1}.rename{width:44px;height:44px;border:1px solid rgba(34,33,31,.14);border-radius:8px;background:rgba(255,255,255,.75)}.meters{display:grid;grid-template-columns:1fr 1fr;gap:10px}.meter{padding:12px;border:1px solid rgba(34,33,31,.14);border-radius:8px;background:rgba(255,255,255,.72)}.meter span{display:block;color:#716a5f;font-size:13px}.meter strong{display:block;margin:4px 0 9px;font-size:22px;line-height:1}.track{height:8px;overflow:hidden;border-radius:999px;background:rgba(34,33,31,.11)}.track i{display:block;width:50%;height:100%;border-radius:inherit;background:#2aa198;transition:width .2s ease}.stage{position:relative;display:grid;place-items:center;min-height:320px}.speech{position:absolute;top:22px;max-width:min(330px,calc(100vw - 44px));padding:12px 14px;border:1px solid rgba(34,33,31,.14);border-radius:8px;background:rgba(255,255,255,.86);box-shadow:0 14px 34px rgba(34,33,31,.1);text-align:center}.pet{position:relative;width:clamp(176px,52vw,260px);aspect-ratio:1;margin-top:54px;border:0;background:transparent;filter:drop-shadow(0 20px 60px rgba(59,43,24,.18));animation:stroll 5.6s ease-in-out infinite}.face,.body,.ear,.paw{position:absolute;display:block}.face{inset:12% 12% 22%;z-index:2;border:4px solid #d98e35;border-radius:48% 48% 43% 43%;background:#ffd166}.body{inset:49% 21% 12%;z-index:1;border:4px solid #d98e35;border-radius:44% 44% 48% 48%;background:#f8b84e}.ear{top:7%;z-index:1;width:28%;height:31%;border:4px solid #d98e35;background:#ffd166}.l{left:16%;border-radius:70% 20% 55% 26%;transform:rotate(-20deg)}.r{right:16%;border-radius:20% 70% 26% 55%;transform:rotate(20deg)}.eye{position:absolute;top:40%;width:14%;height:18%;border-radius:999px;background:#22211f;animation:blink 4.2s infinite}.el{left:28%}.er{right:28%}.mouth{position:absolute;left:50%;top:58%;width:18%;height:10%;border-bottom:4px solid #22211f;border-radius:0 0 999px 999px;transform:translateX(-50%)}.cheek{position:absolute;top:58%;width:14%;height:8%;border-radius:999px;background:rgba(239,111,108,.38)}.cl{left:18%}.cr{right:18%}.paw{bottom:7%;z-index:3;width:18%;height:15%;border:4px solid #d98e35;border-radius:999px;background:#ffd166}.pl{left:27%}.pr{right:27%}.happy{animation:hop .68s ease-in-out 2}.sleepy .eye{height:3%;top:48%;animation:none}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.actions button{min-height:58px;border:1px solid rgba(34,33,31,.14);border-radius:8px;background:rgba(255,255,255,.82);box-shadow:0 12px 26px rgba(34,33,31,.1);font-weight:800}.actions span{display:block;margin-bottom:2px;font-size:21px}@keyframes stroll{0%,100%{transform:translateX(-16px) rotate(-1deg)}50%{transform:translateX(16px) rotate(1deg)}}@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}}@keyframes hop{0%,100%{transform:translateY(0)}40%{transform:translateY(-22px) scale(1.03)}}@media (min-width:700px){.app{max-width:520px;margin:0 auto}}
</style>
<main class="app">
  <section class="top"><div><p>Pocket Pet</p><h1 id="name">Momo</h1></div><button class="rename" id="rename" type="button">✎</button></section>
  <section class="meters"><div class="meter"><span>饱腹</span><strong id="hungerText">80</strong><div class="track"><i id="hungerBar"></i></div></div><div class="meter"><span>心情</span><strong id="moodText">75</strong><div class="track"><i id="moodBar" style="background:#ef6f6c"></i></div></div></section>
  <section class="stage"><div class="speech" id="speech">今天也一起待一会儿吧。</div><button class="pet" id="pet" type="button"><span class="ear l"></span><span class="ear r"></span><span class="face"><span class="eye el"></span><span class="eye er"></span><span class="mouth"></span><span class="cheek cl"></span><span class="cheek cr"></span></span><span class="body"></span><span class="paw pl"></span><span class="paw pr"></span></button></section>
  <section class="actions"><button id="feed" type="button"><span>🍙</span>喂食</button><button id="play" type="button"><span>✨</span>玩耍</button><button id="nap" type="button"><span>☾</span>小睡</button></section>
</main>
<script>
const K="pocket-pet-state-v1",D={name:"Momo",hunger:80,mood:75,mode:"idle",lastSeen:Date.now()},L={feed:["好吃！再来一口也可以。","饱饱的，心情变好了。"],play:["嘿！这个我喜欢。","再玩一会儿吧。"],nap:["我眯一下，醒来会更精神。","呼噜呼噜。"],pet:["摸摸很舒服。","嘿嘿。","我听见你啦。"],idle:["今天也一起待一会儿吧。","点点我，我会有反应。"]};function c(v){return Math.max(0,Math.min(100,Math.round(v||0)))}function load(){try{const p=JSON.parse(localStorage.getItem(K));const h=Math.max(0,(Date.now()-Number(p.lastSeen||Date.now()))/36e5);return{...D,...p,hunger:c(Number(p.hunger)-Math.floor(h*4)),mood:c(Number(p.mood)-Math.floor(h*2)),lastSeen:Date.now()}}catch{return{...D}}}const s=load(),$=q=>document.querySelector(q);function save(){s.lastSeen=Date.now();localStorage.setItem(K,JSON.stringify(s))}function render(){$("#name").textContent=s.name;$("#hungerText").textContent=s.hunger;$("#moodText").textContent=s.mood;$("#hungerBar").style.width=s.hunger+"%";$("#moodBar").style.width=s.mood+"%";$("#pet").classList.toggle("sleepy",s.mode==="nap");save()}function say(t){$("#speech").textContent=t}function pick(a){return a[Math.floor(Math.random()*a.length)]}function bounce(){const p=$("#pet");p.classList.remove("happy");void p.offsetWidth;p.classList.add("happy")}function act(k){if(k==="feed"){s.hunger=c(s.hunger+18);s.mood=c(s.mood+4);s.mode="idle"}if(k==="play"){s.mood=c(s.mood+16);s.hunger=c(s.hunger-6);s.mode="idle"}if(k==="nap"){s.mood=c(s.mood+8);s.hunger=c(s.hunger-2);s.mode="nap"}if(k==="pet"){s.mood=c(s.mood+5)}render();bounce();say(pick(L[k]))}$("#feed").onclick=()=>act("feed");$("#play").onclick=()=>act("play");$("#nap").onclick=()=>act("nap");$("#pet").onclick=()=>act("pet");$("#rename").onclick=()=>{const n=prompt("给桌宠取个名字",s.name);if(n){s.name=n.trim().slice(0,12)||s.name;render();say(s.name+" 记住自己的名字了。")}};setInterval(()=>{s.hunger=c(s.hunger-1);if(s.hunger<30)s.mood=c(s.mood-1);render()},90000);render();
</script>
</html>
